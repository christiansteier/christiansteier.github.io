<!DOCTYPE html>
<!--
  ============================================================
  BEITRAGS-VORLAGE
  So legst du einen neuen Beitrag an:

       /blog/<url-slug>/index.html      (z. B. /blog/moodle-4-5-plugins-2026/index.html)

<html lang="de">

    "description": "{{BESCHREIBUNG_150_ZEICHEN}}",

  <style>
    :root {
      --paper:#faf8f4; --ink:#1b1a17; --muted:#6b665c; --line:#e6e1d7; --accent:#c02a1b; --card:#f2eee5;
      --mono: ui-monospace,"SF Mono","SFMono-Regular",Menlo,Consolas,"Liberation Mono",monospace;
      --sans: system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }
    @media (prefers-color-scheme: dark){ :root{ --paper:#1a1917; --ink:#ece8df; --muted:#9a9488; --line:#2c2a25; --accent:#ff6f5e; --card:#211f1b; } }
    :root[data-theme="light"]{ --paper:#faf8f4; --ink:#1b1a17; --muted:#6b665c; --line:#e6e1d7; --accent:#c02a1b; --card:#f2eee5; }
    :root[data-theme="dark"]{ --paper:#1a1917; --ink:#ece8df; --muted:#9a9488; --line:#2c2a25; --accent:#ff6f5e; --card:#211f1b; }
    *{ box-sizing:border-box; }
    body{ margin:0; background:var(--paper); color:var(--ink); font-family:var(--sans); line-height:1.7; -webkit-font-smoothing:antialiased; }
    .wrap{ max-width:40rem; margin:0 auto; padding:0 1.5rem; }
    header.site{ border-bottom:1px solid var(--line); }
    header.site .wrap{ display:flex; justify-content:space-between; padding:.75rem 1.5rem; }
    .brand{ font-family:var(--mono); font-size:.82rem; color:var(--ink); text-decoration:none; }
    .brand::before{ content:"cms@steier ~ $ "; color:var(--muted); }
    header.site nav a{ font-family:var(--mono); font-size:.8rem; color:var(--muted); text-decoration:none; }
    header.site nav a:hover{ color:var(--accent); }
    article{ padding:3rem 0; }
    .date{ font-family:var(--mono); font-size:.8rem; color:var(--accent); }
    h1{ font-size:clamp(1.8rem,5vw,2.4rem); letter-spacing:-.02em; margin:.4rem 0 1.5rem; line-height:1.15; }
    article h2{ font-size:1.3rem; margin:2rem 0 .6rem; }
    article p{ margin:0 0 1.1rem; }
    article a{ color:var(--accent); }
    .backlink{ font-family:var(--mono); font-size:.85rem; }
    footer{ border-top:1px solid var(--line); padding:2rem 0 3rem; color:var(--muted); font-size:.85rem; }
    footer a{ color:var(--accent); text-decoration:none; }
  </style>
</head>
<body>
  <header class="site">
    <div class="wrap">
      <a class="brand" href="/">steier.xyz</a>

  <footer class="wrap">

</html>
