  <style>
    :root {
      --paper:#faf8f4; --ink:#1b1a17; --muted:#6b665c; --line:#e6e1d7; --accent:#c02a1b; --card:#f2eee5;
      --mono: ui-monospace,"SF Mono","SFMono-Regular",Menlo,Consolas,"Liberation Mono",monospace;
      --sans: system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }
    @media (prefers-color-scheme: dark){ :root{ --paper:#1a1917; --ink:#ece8df; --muted:#9a9488; --line:#2c2a25; --accent:#ff6f5e; --card:#211f1b; } }
    :root[data-theme="light"]{ --paper:#faf8f4; --ink:#1b1a17; --muted:#6b665c; --line:#e6e1d7; --accent:#c02a1b; --card:#f2eee5; }
    :root[data-theme="dark"]{ --paper:#1a1917; --ink:#ece8df; --muted:#9a9488; --line:#2c2a25; --accent:#ff6f5e; --card:#211f1b; }
    *{ box-sizing:border-box; }
    body{ margin:0; background:var(--paper); color:var(--ink); font-family:var(--sans); line-height:1.62; -webkit-font-smoothing:antialiased; }
    .wrap{ max-width:42rem; margin:0 auto; padding:0 1.5rem; }
    header.site{ border-bottom:1px solid var(--line); position:sticky; top:0; background:color-mix(in srgb,var(--paper) 90%,transparent); backdrop-filter:blur(8px); z-index:10; }
    header.site .wrap{ display:flex; align-items:center; justify-content:space-between; padding:.75rem 1.5rem; gap:1rem; }
    .brand{ font-family:var(--mono); font-size:.82rem; letter-spacing:-.02em; color:var(--ink); text-decoration:none; white-space:nowrap; }
    .brand::before{ content:"cms@steier ~ $ "; color:var(--muted); }
    header.site nav{ display:flex; gap:1.1rem; font-family:var(--mono); font-size:.8rem; }
    header.site nav a{ color:var(--muted); text-decoration:none; }
    header.site nav a:hover{ color:var(--accent); }
    .hero{ padding:3.5rem 0 1.5rem; }
    .eyebrow{ font-family:var(--mono); font-size:.8rem; font-weight:400; color:var(--accent); margin:0 0 1rem; }
    .eyebrow::before{ content:"// "; opacity:.55; }
    h1{ font-size:clamp(1.8rem,5vw,2.4rem); letter-spacing:-.02em; margin:0 0 .5rem; }
    .lead{ color:var(--muted); font-size:1.1rem; margin:0; max-width:60ch; }
    .posts{ list-style:none; margin:0; padding:2rem 0 0; border-top:1px solid var(--line); margin-top:2rem; }
    .posts li{ padding:1.1rem 0; border-bottom:1px solid var(--line); }
    .posts a.post-title{ font-size:1.15rem; font-weight:600; color:var(--ink); text-decoration:none; }
    .posts a.post-title:hover{ color:var(--accent); }
    .posts .date{ font-family:var(--mono); font-size:.8rem; color:var(--muted); display:block; margin-bottom:.2rem; }
    .posts .excerpt{ color:var(--muted); margin:.3rem 0 0; font-size:.95rem; }
    .empty{ color:var(--muted); padding:2rem 0; border-top:1px solid var(--line); margin-top:2rem; }
    footer{ border-top:1px solid var(--line); padding:2rem 0 3rem; margin-top:2rem; color:var(--muted); font-size:.85rem; }
    footer a{ color:var(--accent); text-decoration:none; }
    a:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  </style>
